name: Potshelf
options:
  bundleIdPrefix: com.shimondeitel.potshelf
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Potshelf:
    type: application
    platform: iOS
    sources:
      - path: Potshelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.potshelf
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Potshelf/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PotshelfTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PotshelfTests
      - path: Potshelf.storekit
    dependencies:
      - target: Potshelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.potshelf.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PotshelfUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PotshelfUITests
    dependencies:
      - target: Potshelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.potshelf.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Potshelf:
    build:
      targets:
        Potshelf: all
        PotshelfTests: [test]
        PotshelfUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Potshelf.storekit
    test:
      config: Debug
      storeKitConfiguration: Potshelf.storekit
      targets:
        - PotshelfTests
        - PotshelfUITests
    archive:
      config: Release
